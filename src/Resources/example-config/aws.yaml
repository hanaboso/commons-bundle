parameters:
    env(AWS_KEY): key
    aws_key: '%env(string:AWS_KEY)%'

    env(AWS_SECRET): secret
    aws_secret: '%env(string:AWS_SECRET)%'

    env(AWS_BUCKET): bucket
    aws_bucket: '%env(string:AWS_BUCKET)%'

aws:
    version: latest
    region: eu-west-1
    credentials:
        key: '%aws_key%'
        secret: '%aws_secret%'
